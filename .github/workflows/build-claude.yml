name: Build and Push Claude CLI

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 6am UTC
  push:
    branches: [main]
    paths:
      - images/claude/**
  pull_request:
    branches: [main]
    paths:
      - images/claude/**
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: p9labs-io

jobs:
  build:
    name: Claude Code CLI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: images/claude
          file: images/claude/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
          tags: |
            ghcr.io/${{ env.ORG }}/claude-cli:latest
            ghcr.io/${{ env.ORG }}/claude-cli:${{ github.sha }}
          no-cache: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max