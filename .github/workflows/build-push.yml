name: Build and Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: p9labs-io

jobs:
  build-claude:
    name: Claude Code CLI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Claude image
        uses: docker/build-push-action@v5
        with:
          context: images/claude
          file: images/claude/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.ORG }}/claude-cli:latest
            ghcr.io/${{ env.ORG }}/claude-cli:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-gemini:
    name: Gemini CLI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Gemini image
        uses: docker/build-push-action@v5
        with:
          context: images/gemini
          file: images/gemini/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.ORG }}/gemini-cli:latest
            ghcr.io/${{ env.ORG }}/gemini-cli:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max